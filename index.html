<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Crease | Mobile Audio Campaign</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #030305;
            overflow: hidden;
            margin: 0;
            color: #e2e8f0;
            transition: background-color 0.5s ease;
            /* Mobile Optimizations */
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        button {
            /* Eliminates the 300ms tap delay on mobile */
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            outline: none !important;
        }

        .font-display { font-family: 'Orbitron', sans-serif; }

        .glass-panel {
            background: rgba(10, 10, 20, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 204, 0.15);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 255, 204, 0.05);
            transition: all 0.5s ease;
        }

        body.god-mode { background-color: #141000; }
        body.god-mode .glass-panel {
            background: rgba(25, 15, 0, 0.7);
            border-color: rgba(255, 215, 0, 0.4);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9), inset 0 0 30px rgba(255, 215, 0, 0.2);
        }

        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.5;
            animation: pulse-orb 6s infinite alternate ease-in-out;
            transition: background-color 1s ease;
        }
        
        @keyframes pulse-orb {
            0% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(1.1); opacity: 0.6; }
        }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-6px, 6px) rotate(-2deg); }
            40% { transform: translate(6px, -6px) rotate(2deg); }
            60% { transform: translate(-6px, -6px) rotate(-2deg); }
            80% { transform: translate(6px, 6px) rotate(2deg); }
        }
        .shake-active { animation: shake 0.35s cubic-bezier(.36,.07,.19,.97) both; }

        canvas {
            background-image: linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center bottom;
        }
    </style>
</head>
<body class="h-[100dvh] w-screen flex flex-col justify-center items-center p-2 sm:p-4 relative" id="main-body">

    <div id="orb-left" class="ambient-orb bg-teal-600/50 w-[300px] h-[300px] sm:w-[400px] sm:h-[400px] top-[-5%] left-[-5%]"></div>
    <div id="orb-right" class="ambient-orb bg-indigo-600/50 w-[400px] h-[400px] sm:w-[500px] sm:h-[500px] bottom-[-5%] right-[-5%]" style="animation-delay: -3s;"></div>

    <div id="game-container" class="w-full max-w-5xl h-full max-h-[850px] glass-panel rounded-[1.5rem] sm:rounded-3xl p-3 sm:p-6 flex flex-col gap-3 sm:gap-4 relative z-10">
        
        <header class="flex justify-between items-center bg-black/40 rounded-xl sm:rounded-2xl p-2 sm:p-4 border border-white/10 shadow-inner shrink-0">
            <div class="flex flex-col">
                <h1 class="font-display text-xl sm:text-4xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-indigo-400 drop-shadow-[0_0_10px_rgba(45,212,191,0.5)] transition-colors duration-500" id="game-title">
                    NEON CREASE
                </h1>
                <div class="flex items-center gap-2 mt-1">
                    <span class="text-[8px] sm:text-xs text-fuchsia-400 font-bold border border-fuchsia-500/30 px-2 py-0.5 rounded-full bg-fuchsia-900/30 shadow-[0_0_8px_rgba(217,70,239,0.3)] whitespace-nowrap" id="level-indicator">LVL 1 / 30</span>
                    <span class="text-[8px] sm:text-xs font-mono font-bold text-amber-400 hidden drop-shadow-[0_0_5px_rgba(251,191,36,0.8)]" id="streak-indicator">STREAK: 0</span>
                </div>
            </div>
            
            <div class="flex gap-2 sm:gap-4 items-center">
                <div class="flex flex-col items-center justify-center border-r border-white/10 pr-2 sm:pr-4">
                    <span class="text-[8px] sm:text-[10px] uppercase tracking-widest text-slate-500 font-bold">Target</span>
                    <span class="font-display text-lg sm:text-2xl text-white" id="target-display">12</span>
                </div>
                <div class="flex flex-col items-center justify-center border-r border-white/10 pr-2 sm:pr-4" id="score-box">
                    <span class="text-[8px] sm:text-[10px] uppercase tracking-widest text-teal-500 font-bold transition-colors" id="score-label">Score</span>
                    <span class="font-display text-2xl sm:text-4xl text-teal-400 drop-shadow-[0_0_8px_rgba(45,212,191,0.8)] transition-colors" id="score-display">0</span>
                </div>
                <div class="flex flex-col items-center justify-center border-r border-white/10 pr-2 sm:pr-4">
                    <span class="text-[8px] sm:text-[10px] uppercase tracking-widest text-rose-500 font-bold">Balls</span>
                    <span class="font-display text-2xl sm:text-4xl text-rose-400 drop-shadow-[0_0_8px_rgba(244,63,94,0.8)]" id="balls-display">6</span>
                </div>
                
                <button onclick="togglePause()" id="btn-pause" class="flex flex-col items-center justify-center bg-white/5 hover:bg-white/10 border border-white/20 p-1.5 sm:px-4 sm:py-3 rounded-lg sm:rounded-xl transition-all h-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 sm:h-5 sm:w-5 text-slate-300 mb-0.5 sm:mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="pause-icon">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </button>
            </div>
        </header>

        <div class="flex-1 relative w-full bg-[#020204] rounded-xl sm:rounded-2xl border border-white/10 overflow-hidden shadow-[0_0_30px_rgba(0,0,0,0.9)_inset]">
            <canvas id="gameCanvas" class="w-full h-full block"></canvas>
            
            <div id="feedback-layer" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-150 z-20">
                <h2 class="font-display text-4xl sm:text-8xl font-black italic transform -skew-x-12 scale-50 transition-transform duration-200 ease-out text-center" id="feedback-text">BOOM!</h2>
            </div>

            <div id="pause-layer" class="absolute inset-0 z-30 bg-black/60 backdrop-blur-sm flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
                <h2 class="font-display text-2xl sm:text-6xl text-white tracking-[0.4em] drop-shadow-[0_0_15px_rgba(255,255,255,0.8)]">PAUSED</h2>
            </div>
        </div>

        <div class="flex gap-2 sm:gap-4 shrink-0 h-24 sm:h-24 w-full pb-2 sm:pb-0">
            <button id="btn-swing" class="flex-1 h-full rounded-xl sm:rounded-2xl bg-gradient-to-r from-indigo-700 via-teal-600 to-indigo-700 active:from-teal-500 active:to-indigo-500 text-white font-bold tracking-[0.2em] sm:tracking-[0.3em] uppercase border border-teal-400/50 shadow-[0_0_20px_rgba(45,212,191,0.4)] transition-all duration-100 active:scale-[0.95] flex flex-col items-center justify-center group overflow-hidden relative touch-none">
                <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-in-out hidden sm:block"></div>
                <span class="text-[9px] sm:text-xs opacity-80 mb-1 relative z-10 font-mono pointer-events-none">OP:PLAYER</span>
                <span class="font-display text-3xl sm:text-4xl relative z-10 drop-shadow-[0_0_10px_rgba(255,255,255,0.5)] pointer-events-none">POWER SWING</span>
            </button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-[#020204]/95 backdrop-blur-xl z-50 hidden flex-col items-center justify-center opacity-0 transition-opacity duration-500 p-4">
        <div class="glass-panel p-6 sm:p-12 rounded-[2rem] text-center max-w-xl w-full transform scale-90 transition-transform duration-500">
            <h2 class="font-display text-3xl sm:text-6xl text-white mb-2 drop-shadow-[0_0_30px_rgba(255,255,255,0.8)]" id="modal-title">VICTORY</h2>
            <p class="text-slate-400 tracking-widest uppercase text-[10px] sm:text-sm mb-6 sm:mb-8" id="modal-subtitle">Target Overridden</p>
            
            <div class="bg-black/50 px-6 py-4 sm:px-8 sm:py-6 rounded-2xl border border-white/10 shadow-inner inline-block mb-6 sm:mb-8">
                <p class="text-[9px] sm:text-[10px] uppercase tracking-widest text-slate-500 mb-1">Final Score</p>
                <p class="font-display text-5xl sm:text-7xl text-teal-400 drop-shadow-[0_0_20px_rgba(45,212,191,0.8)]" id="final-score">32</p>
            </div>
            
            <button id="modal-btn" class="w-full py-4 sm:py-5 rounded-xl bg-white/10 active:bg-white/20 border border-white/30 text-white font-bold tracking-[0.2em] text-sm sm:text-lg uppercase transition-all duration-300">
                NEXT LEVEL
            </button>
        </div>
    </div>

<script>
    // --- Audio Synthesizer Engine ---
    let audioCtx;
    
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'swing') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
            gainNode.gain.setValueAtTime(0.1, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'hit') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
            gainNode.gain.setValueAtTime(0.2, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now);
            osc.stop(now + 0.2);
        } else if (type === 'monster_hit') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        } else if (type === 'bowled') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.linearRampToValueAtTime(20, now + 0.5);
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.linearRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        } else if (type === 'win') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.setValueAtTime(554.37, now + 0.1); 
            osc.frequency.setValueAtTime(659.25, now + 0.2); 
            osc.frequency.setValueAtTime(880, now + 0.3); 
            gainNode.gain.setValueAtTime(0.2, now);
            gainNode.gain.linearRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        } else if (type === 'lose') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.linearRampToValueAtTime(50, now + 1);
            gainNode.gain.setValueAtTime(0.2, now);
            gainNode.gain.linearRampToValueAtTime(0.01, now + 1);
            osc.start(now);
            osc.stop(now + 1);
        }
    }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Dynamic Speed Scaling for Mobile
    function getPhysicsScale() {
        return canvas.width < 600 ? canvas.width / 600 : 1;
    }

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Campaign State ---
    const MAX_LEVELS = 30;
    let currentLevel = 0; 
    let currentTarget = 12;
    let runs = 0; 
    let ballsLeft = 6;
    let gameState = 'waiting'; 
    let matchActive = false;
    let streak = 0; 
    let isGodMode = false;
    let isPaused = false;

    // --- Entity Definitions ---
    const ball = { x: -50, y: 0, vx: 0, vy: 0, radius: 5, active: false, color: '#2dd4bf', glow: 'rgba(45,212,191,0.8)', trail: [] };
    const getGround = () => canvas.height - 20; 

    // Positions relative to canvas width for mobile safety
    const stumps = { get x() { return canvas.width - (40 * Math.max(1, getPhysicsScale())); }, get y() { return getGround() - 40; }, width: 15, height: 40 };
    const batsman = { get x() { return canvas.width - (90 * Math.max(1, getPhysicsScale())); }, get y() { return getGround(); }, swingAngle: -Math.PI / 8, targetAngle: -Math.PI / 8, isSwinging: false };
    const bowler = { get x() { return 30 * Math.max(1, getPhysicsScale()); }, get y() { return getGround(); }, armAngle: Math.PI / 2, isBowling: false, profile: null };
    
    let particles = []; let raindrops = [];
    for(let i=0; i<60; i++) raindrops.push({ x: Math.random() * 2000, y: Math.random() * 1000, l: Math.random() * 15 + 10, v: Math.random() * 8 + 12 });

    // --- UI Hooks ---
    const uiScore = document.getElementById('score-display');
    const uiBalls = document.getElementById('balls-display');
    const uiTarget = document.getElementById('target-display');
    const uiLevel = document.getElementById('level-indicator');
    const btnSwing = document.getElementById('btn-swing');
    const modalBtn = document.getElementById('modal-btn');

    // --- Pause System ---
    function togglePause() {
        if (!matchActive && gameState !== 'bowler_animating' && gameState !== 'bowling' && gameState !== 'hit') return;
        isPaused = !isPaused;
        
        const pIcon = document.getElementById('pause-icon');
        const pLayer = document.getElementById('pause-layer');

        if (isPaused) {
            pIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />`;
            pLayer.classList.remove('hidden');
            requestAnimationFrame(() => pLayer.classList.remove('opacity-0'));
        } else {
            pIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" />`;
            pLayer.classList.add('opacity-0');
            setTimeout(() => pLayer.classList.add('hidden'), 300);
        }
    }

    function toggleGodMode(active) {
        isGodMode = active;
        const els = {
            body: document.getElementById('main-body'), title: document.getElementById('game-title'),
            orbL: document.getElementById('orb-left'), orbR: document.getElementById('orb-right'),
            sBox: document.getElementById('score-box'), sLabel: document.getElementById('score-label'),
            btnBg: document.getElementById('btn-swing'), ind: document.getElementById('streak-indicator')
        };

        if (active) {
            els.body.classList.add('god-mode');
            els.title.className = "font-display text-xl sm:text-4xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-amber-300 to-yellow-600 drop-shadow-[0_0_15px_rgba(255,215,0,0.8)]";
            els.orbL.className = "ambient-orb bg-yellow-600/50 w-[300px] h-[300px] sm:w-[400px] sm:h-[400px] top-[-5%] left-[-5%]";
            els.orbR.className = "ambient-orb bg-amber-600/50 w-[400px] h-[400px] sm:w-[500px] sm:h-[500px] bottom-[-5%] right-[-5%]";
            els.sBox.className = "flex flex-col items-center justify-center border-r border-yellow-500/50 pr-2 sm:pr-4 transition-colors duration-500";
            els.sLabel.className = "text-[8px] sm:text-[10px] uppercase tracking-widest text-yellow-500 font-bold transition-colors";
            uiScore.className = "font-display text-2xl sm:text-4xl text-yellow-400 drop-shadow-[0_0_10px_rgba(255,215,0,0.8)] transition-colors";
            els.btnBg.className = "flex-1 h-full rounded-xl sm:rounded-2xl bg-gradient-to-r from-yellow-700 via-amber-500 to-yellow-700 active:from-amber-500 active:to-yellow-500 text-black font-black tracking-[0.2em] sm:tracking-[0.3em] uppercase border border-yellow-400 shadow-[0_0_30px_rgba(255,215,0,0.6)] transition-all duration-100 active:scale-[0.95] flex flex-col items-center justify-center group overflow-hidden relative touch-none";
            els.ind.classList.remove('hidden');
        } else {
            els.body.classList.remove('god-mode');
            els.title.className = "font-display text-xl sm:text-4xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-indigo-400 drop-shadow-[0_0_10px_rgba(45,212,191,0.5)]";
            els.orbL.className = "ambient-orb bg-teal-600/50 w-[300px] h-[300px] sm:w-[400px] sm:h-[400px] top-[-5%] left-[-5%]";
            els.orbR.className = "ambient-orb bg-indigo-600/50 w-[400px] h-[400px] sm:w-[500px] sm:h-[500px] bottom-[-5%] right-[-5%]";
            els.sBox.className = "flex flex-col items-center justify-center border-r border-white/10 pr-2 sm:pr-4 transition-colors duration-500";
            els.sLabel.className = "text-[8px] sm:text-[10px] uppercase tracking-widest text-teal-500 font-bold transition-colors";
            uiScore.className = "font-display text-2xl sm:text-4xl text-teal-400 drop-shadow-[0_0_8px_rgba(45,212,191,0.8)] transition-colors";
            els.btnBg.className = "flex-1 h-full rounded-xl sm:rounded-2xl bg-gradient-to-r from-indigo-700 via-teal-600 to-indigo-700 active:from-teal-500 active:to-indigo-500 text-white font-bold tracking-[0.2em] sm:tracking-[0.3em] uppercase border border-teal-400/50 shadow-[0_0_20px_rgba(45,212,191,0.4)] transition-all duration-100 active:scale-[0.95] flex flex-col items-center justify-center group overflow-hidden relative touch-none";
            els.ind.classList.add('hidden');
        }
    }

    // --- Dynamic Campaign Logic ---
    function initLevel(levelIdx) {
        currentLevel = levelIdx;
        currentTarget = Math.min(36, 12 + Math.floor(currentLevel * 0.8));
        runs = 0; ballsLeft = 6;
        streak = 0; toggleGodMode(false);
        matchActive = true;
        gameState = 'waiting';
        ball.active = false;
        isPaused = false;
        
        uiScore.innerText = runs;
        uiBalls.innerText = ballsLeft;
        uiTarget.innerText = currentTarget;
        uiLevel.innerText = `LVL ${currentLevel + 1} / 30`;
        
        document.getElementById('modal').classList.add('hidden');
        document.getElementById('modal').classList.remove('flex');
        
        setTimeout(() => { startAutoBowlSequence(); }, 1000);
    }

    function startAutoBowlSequence() {
        if (!matchActive) return;
        setTimeout(() => { 
            if (isPaused) { startAutoBowlSequence(); return; }
            if (matchActive) initiateBowlerRunup(); 
        }, Math.random() * 800 + 600);
    }

    function initiateBowlerRunup() {
        gameState = 'bowler_animating';
        
        // Base speeds
        const spinSpeed = 12 + (currentLevel * 0.2);
        const medSpeed = 15 + (currentLevel * 0.3);
        const fastSpeed = 18 + (currentLevel * 0.4);

        const speeds = [
            { v: spinSpeed, col: '#818cf8', glow: 'rgba(129,140,248,0.8)' }, 
            { v: medSpeed, col: '#f472b6', glow: 'rgba(244,114,182,0.8)' }, 
            { v: fastSpeed, col: '#fbbf24', glow: 'rgba(251,191,36,0.8)' }
        ];
        
        bowler.profile = speeds[Math.floor(Math.random() * speeds.length)];
        
        if (isGodMode) { 
            bowler.profile.col = '#ffffff'; 
            bowler.profile.glow = 'rgba(255,215,0,1)'; 
            bowler.profile.v = Math.min(bowler.profile.v, 18); 
        }
        
        bowler.isBowling = true;
        bowler.armAngle = Math.PI; 
    }

    function handleSwingInput(e) {
        if (e && e.cancelable) e.preventDefault(); // Stops double triggering on mobile safely
        initAudio(); // Boot sound engine if not already active
        
        if (!matchActive || isPaused || batsman.isSwinging) return;
        
        playSound('swing');
        batsman.isSwinging = true; batsman.targetAngle = Math.PI / 1.5; 
        if (gameState === 'bowling' && ball.active) evaluateHit();
    }

    // Attach both touch and click for maximum responsiveness
    btnSwing.addEventListener('touchstart', handleSwingInput, {passive: false});
    btnSwing.addEventListener('mousedown', handleSwingInput);

    function evaluateHit() {
        const pScale = getPhysicsScale();
        const sweetSpot = batsman.x; 
        // Normalize accuracy based on screen width
        const accuracy = Math.abs(ball.x - sweetSpot) / pScale;
        
        const levelTolerance = Math.max(0.45, 1.2 - (currentLevel * 0.025)); 
        const tMult = (isGodMode ? 3 : 1) * levelTolerance; 
        
        let runsScored = 0; let msg = ''; let txtColor = '';

        if (accuracy < 25 * tMult) {
            runsScored = 6; msg = '6!'; txtColor = 'text-amber-400 drop-shadow-[0_0_30px_rgba(251,191,36,0.9)]';
            playSound('monster_hit');
            triggerShake(); spawnExplosion(ball.x, ball.y, isGodMode ? '#fff' : ball.color, 60);
        } else if (accuracy < 55 * tMult) {
            runsScored = 4; msg = '4!'; txtColor = 'text-teal-400 drop-shadow-[0_0_20px_rgba(45,212,191,0.8)]';
            playSound('hit');
            triggerShake(); spawnExplosion(ball.x, ball.y, ball.color, 30);
        } else if (accuracy < 80 * tMult) {
            runsScored = 2; msg = 'GOOD'; txtColor = 'text-indigo-300';
            playSound('hit');
            spawnExplosion(ball.x, ball.y, '#fff', 15);
        } else if (accuracy < 120 * tMult) {
            runsScored = 1; msg = 'HIT'; txtColor = 'text-slate-400';
            playSound('hit');
        } else {
            runsScored = 0; msg = 'MISS'; txtColor = 'text-slate-500';
        }

        if (runsScored >= 4) {
            streak++; document.getElementById('streak-indicator').innerText = `STREAK: ${streak}`;
            if (streak >= 2 && !isGodMode) toggleGodMode(true);
        } else if (runsScored > 0) {
            streak = 0; toggleGodMode(false);
        }

        applyResult(runsScored, msg, txtColor, accuracy < 120 * tMult);
    }

    function applyResult(runsScored, msg, txtColor, hitContact) {
        if (hitContact) {
            runs += runsScored; ballsLeft--;
            uiScore.innerText = runs; uiBalls.innerText = ballsLeft;
            showPopup(msg, txtColor); 
            gameState = 'hit';
            
            const pScale = getPhysicsScale();
            ball.vx = -(ball.vx * 1.5); 
            ball.vy = (-10 - (runsScored * 2)) * pScale; 
            checkWinCondition();
        }
    }

    function triggerBowled() {
        playSound('bowled');
        streak = 0; toggleGodMode(false);
        ballsLeft--; uiBalls.innerText = ballsLeft;
        triggerShake(); spawnExplosion(stumps.x + 10, stumps.y + 20, '#f43f5e', 80);
        showPopup('OUT!', 'text-rose-500 drop-shadow-[0_0_30px_rgba(244,63,94,1)]');
        ball.active = false; checkWinCondition();
    }

    function checkWinCondition() {
        if (runs >= currentTarget) {
            matchActive = false; 
            setTimeout(() => {
                if(currentLevel < MAX_LEVELS - 1) showEndScreen('advance');
                else showEndScreen('victory');
            }, 1000);
        } else if (ballsLeft <= 0) {
            matchActive = false; 
            setTimeout(() => showEndScreen('fail'), 1000);
        } else {
            gameState = 'resetting';
            setTimeout(() => { ball.active = false; gameState = 'waiting'; startAutoBowlSequence(); }, 1200);
        }
    }

    function triggerShake() {
        if (isPaused) return;
        const c = document.getElementById('game-container');
        c.classList.add('shake-active'); setTimeout(() => c.classList.remove('shake-active'), 350);
    }

    function showPopup(text, colorClasses) {
        const layer = document.getElementById('feedback-layer'); const txt = document.getElementById('feedback-text');
        txt.innerText = text;
        txt.className = `font-display text-5xl sm:text-8xl font-black italic transform -skew-x-12 transition-transform duration-200 ease-out scale-100 ${colorClasses}`;
        layer.style.opacity = '1';
        setTimeout(() => { txt.classList.replace('scale-100', 'scale-125'); layer.style.opacity = '0'; }, 700);
    }

    function spawnExplosion(x, y, color, count) {
        const pScale = getPhysicsScale();
        for(let i=0; i<count; i++) particles.push({ x: x, y: y, vx: (Math.random()-0.5)*20*pScale, vy: (Math.random()-0.5)*20*pScale, life: 1.0, color: color });
    }

    function drawWeather() {
        const pScale = getPhysicsScale();
        ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1; ctx.beginPath();
        for(let i=0; i<raindrops.length; i++) {
            let p = raindrops[i]; ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - p.l*0.2, p.y + p.l);
            if (!isPaused) {
                p.x -= p.v * 0.2 * pScale; p.y += p.v * pScale;
                if(p.y > canvas.height) { p.y = -20; p.x = Math.random() * 2000; }
            }
        }
        ctx.stroke();
    }

    function drawStumps() {
        ctx.fillStyle = isGodMode ? '#fbbf24' : '#0f172a'; ctx.strokeStyle = isGodMode ? '#fff' : '#38bdf8';
        ctx.lineWidth = 2; ctx.shadowBlur = 10; ctx.shadowColor = isGodMode ? 'rgba(251,191,36,0.8)' : 'rgba(56,189,248,0.8)';
        for(let i=0; i<3; i++) { ctx.beginPath(); ctx.roundRect(stumps.x + (i*6), stumps.y, 4, stumps.height, 2); ctx.fill(); ctx.stroke(); }
        ctx.shadowBlur = 0;
    }

    function drawGeometricBatsman(x, y, angle) {
        const scale = Math.max(0.7, getPhysicsScale());
        ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
        ctx.strokeStyle = isGodMode ? 'rgba(255,215,0,0.9)' : 'rgba(255,255,255,0.8)';
        ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        ctx.beginPath(); ctx.moveTo(0, -40); ctx.lineTo(0, 0); ctx.lineTo(-12, 25); ctx.moveTo(0, 0); ctx.lineTo(12, 25); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, -50, 10, Math.PI, 0); ctx.fillStyle = isGodMode ? '#fff' : '#2dd4bf';
        ctx.shadowBlur = 15; ctx.shadowColor = isGodMode ? '#fbbf24' : '#2dd4bf'; ctx.fill(); ctx.shadowBlur = 0;

        ctx.save(); ctx.translate(0, -35); ctx.rotate(angle);
        ctx.strokeStyle = isGodMode ? '#fbbf24' : '#fff'; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-8, 25); ctx.stroke();
        ctx.fillStyle = '#0f172a'; ctx.strokeStyle = isGodMode ? '#fff' : '#2dd4bf';
        ctx.lineWidth = 2; ctx.shadowBlur = 10; ctx.shadowColor = isGodMode ? '#fbbf24' : '#2dd4bf';
        ctx.beginPath(); ctx.roundRect(-12, 25, 8, 50, 3); ctx.fill(); ctx.stroke();
        ctx.restore(); ctx.restore();
    }

    function drawGeometricBowler(x, y, armAngle) {
        const scale = Math.max(0.7, getPhysicsScale());
        ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
        ctx.strokeStyle = '#6366f1'; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        ctx.beginPath(); ctx.moveTo(0, -40); ctx.lineTo(0, 0); ctx.lineTo(-10, 25); ctx.moveTo(0, 0); ctx.lineTo(15, 25); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, -50, 8, 0, Math.PI * 2); ctx.fillStyle = '#a5b4fc'; ctx.fill();

        ctx.save(); ctx.translate(0, -35); ctx.rotate(armAngle);
        ctx.strokeStyle = isGodMode ? '#fbbf24' : '#f43f5e'; ctx.shadowBlur = 10; ctx.shadowColor = isGodMode ? '#fbbf24' : '#f43f5e';
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0, -25); ctx.stroke();
        
        if(gameState === 'bowler_animating') {
            ctx.beginPath(); ctx.arc(0, -25, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = bowler.profile.col; ctx.shadowColor = bowler.profile.glow; ctx.fill();
        }
        ctx.restore(); ctx.restore();
    }

    function showEndScreen(type) {
        initAudio(); // Keep audio context active
        if(isPaused) togglePause(); 
        const modal = document.getElementById('modal');
        document.getElementById('final-score').innerText = runs;
        
        const title = document.getElementById('modal-title');
        const subtitle = document.getElementById('modal-subtitle');
        
        if(type === 'advance') {
            playSound('win');
            title.innerText = "CLEARED";
            title.className = "font-display text-3xl sm:text-6xl text-teal-400 mb-2 drop-shadow-[0_0_20px_rgba(45,212,191,0.8)] tracking-widest";
            subtitle.innerText = "Ready for Next Level";
            modalBtn.innerText = "START LVL " + (currentLevel + 2);
            modalBtn.onclick = () => initLevel(currentLevel + 1);
        } else if (type === 'victory') {
            playSound('win');
            title.innerText = "CHAMPION";
            title.className = "font-display text-3xl sm:text-6xl text-amber-400 mb-2 drop-shadow-[0_0_30px_rgba(251,191,36,0.9)] tracking-widest";
            subtitle.innerText = "Campaign Complete!";
            modalBtn.innerText = "PLAY AGAIN";
            modalBtn.onclick = () => initLevel(0);
        } else {
            playSound('lose');
            title.innerText = "FAILED";
            title.className = "font-display text-3xl sm:text-6xl text-rose-500 mb-2 drop-shadow-[0_0_20px_rgba(244,63,94,0.8)] tracking-widest";
            subtitle.innerText = `Deficit: ${currentTarget - runs} Runs`;
            modalBtn.innerText = "RETRY LVL " + (currentLevel + 1);
            modalBtn.onclick = () => initLevel(currentLevel);
        }

        modal.classList.remove('hidden'); modal.classList.add('flex');
        requestAnimationFrame(() => modal.classList.remove('opacity-0'));
    }

    function update() {
        requestAnimationFrame(update);
        const pScale = getPhysicsScale();
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawWeather();

        ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(canvas.width - (100 * Math.max(1, pScale)), 0); ctx.lineTo(canvas.width - (100 * Math.max(1, pScale)), canvas.height); ctx.stroke();

        drawStumps();

        if (isPaused) {
            drawGeometricBatsman(batsman.x, batsman.y, batsman.swingAngle);
            drawGeometricBowler(bowler.x, bowler.y, bowler.armAngle);
            if (ball.active) {
                if (ball.trail.length > 1) {
                    ctx.beginPath(); ctx.moveTo(ball.trail[0].x, ball.trail[0].y);
                    for(let i=1; i<ball.trail.length; i++) ctx.lineTo(ball.trail[i].x, ball.trail[i].y);
                    ctx.strokeStyle = ball.color; ctx.lineWidth = 3; ctx.globalAlpha = 0.6; ctx.stroke(); ctx.globalAlpha = 1.0;
                }
                ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#fff'; ctx.shadowBlur = 15; ctx.shadowColor = ball.glow; ctx.fill(); ctx.shadowBlur = 0;
            }
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, Math.random() * 2 + 1, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1.0;
            return; 
        }

        // --- Physics & Animation Updates ---
        batsman.swingAngle += (batsman.targetAngle - batsman.swingAngle) * 0.2;
        drawGeometricBatsman(batsman.x, batsman.y, batsman.swingAngle);
        if (batsman.isSwinging && Math.abs(batsman.swingAngle - batsman.targetAngle) < 0.1) {
            batsman.targetAngle = -Math.PI / 8; batsman.isSwinging = false;
        }

        if (bowler.isBowling) {
            bowler.armAngle -= (0.15 + currentLevel * 0.005); 
            if (bowler.armAngle <= -Math.PI / 4 && !ball.active) {
                ball.x = bowler.x + (15 * pScale); ball.y = bowler.y - (50 * pScale);
                // Scale ball speed so narrow phones don't make it impossibly fast
                ball.vx = bowler.profile.v * pScale; 
                ball.vy = 2 * pScale; 
                ball.color = bowler.profile.col; ball.glow = bowler.profile.glow;
                ball.trail = []; ball.active = true;
                gameState = 'bowling';
            }
            if (bowler.armAngle <= -Math.PI) { bowler.isBowling = false; bowler.armAngle = Math.PI / 2; }
        }
        drawGeometricBowler(bowler.x, bowler.y, bowler.armAngle);

        if (ball.active) {
            ball.x += ball.vx; ball.y += ball.vy;

            if (gameState === 'bowling') {
                ball.vy += 0.2 * pScale; 
                if (ball.y > getGround()) { ball.y = getGround(); ball.vy *= -0.7; }
                
                if (ball.x > stumps.x && ball.x < stumps.x + stumps.width && ball.y > stumps.y) {
                    triggerBowled();
                } else if (ball.x > canvas.width + 30) {
                    streak = 0; toggleGodMode(false);
                    applyResult(0, 'DOT', 'text-slate-500', false); 
                    ball.active = false; checkWinCondition();
                }
            } else if (gameState === 'hit') {
                ball.vy += 0.4 * pScale;
                if (ball.x < -50 || ball.y > canvas.height + 30) ball.active = false; 
            }

            ball.trail.push({x: ball.x, y: ball.y}); if (ball.trail.length > 12) ball.trail.shift();
            
            if (ball.trail.length > 1) {
                ctx.beginPath(); ctx.moveTo(ball.trail[0].x, ball.trail[0].y);
                for(let i=1; i<ball.trail.length; i++) ctx.lineTo(ball.trail[i].x, ball.trail[i].y);
                ctx.strokeStyle = ball.color; ctx.lineWidth = 3; ctx.globalAlpha = 0.6; ctx.stroke(); ctx.globalAlpha = 1.0;
            }

            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff'; ctx.shadowBlur = 15; ctx.shadowColor = ball.glow; ctx.fill(); ctx.shadowBlur = 0;
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.03;
            if (p.life <= 0) particles.splice(i, 1);
            else { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, Math.random() * 2 + 1, 0, Math.PI*2); ctx.fill(); }
        }
        ctx.globalAlpha = 1.0;
    }

    // Init Level 1 instantly
    update();
    initLevel(0);
</script>
</body>
